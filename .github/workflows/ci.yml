name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Check
        run: cargo check --workspace
      - name: Test
        run: cargo test --workspace
      - name: Integration Smoke Test
        run: ./scripts/run-integration-smoke.sh
      - name: Resume Scenarios Smoke Test
        run: ./scripts/run-resume-scenarios.sh
      - name: Watchdog Auto-Recovery Smoke Test
        run: ./scripts/run-watchdog-auto-recovery.sh
      - name: Role-Scoped Recovery Execution Smoke Test
        run: ./scripts/run-role-scoped-recovery-execution.sh
      - name: Component Identity Mapping Smoke Test
        run: ./scripts/run-component-identity-mapping-smoke.sh
      - name: Lockd Identity and UI Path Smoke Test
        run: ./scripts/run-lockd-identity-and-ui-path-smoke.sh
